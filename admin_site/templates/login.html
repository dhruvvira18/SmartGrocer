<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartGrocer | Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body class="login-body">
  <svg class="wave-bg" viewBox="0 0 1440 320" preserveAspectRatio="none">
    <path fill="#1B5E20" fill-opacity="0.9" d="M0,160L60,170.7C120,181,240,203,360,197.3C480,192,600,160,720,144C840,128,960,128,1080,138.7C1200,149,1320,171,1380,181.3L1440,192L1440,0L0,0Z"></path>
  </svg>

  <div class="login-card">
    <div class="logo-text">SmartGrocer Admin</div>
    <h2 style="margin-bottom:20px;">Owner Portal</h2>
    {% if error %}<p style="color:red; margin-bottom:10px;">{{ error }}</p>{% endif %}
    <form action="/login" method="post">
      <div class="input-group"><input type="email" name="email" placeholder="Admin Email" required></div>
      <div class="input-group"><input type="password" name="password" placeholder="Password" required></div>
      <button type="submit" class="login-btn" style="background:#1B5E20;">Enter Dashboard</button>
    </form>
  </div>
</body>
</html>
