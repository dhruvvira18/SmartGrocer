<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartGrocer | Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">

  <div class="organic-bg"></div>

  <div class="login-card">
    <div class="logo-text">SmartGrocer Admin</div>
    <h2 style="margin-bottom:20px;">Owner Portal</h2>
    {% if error %}<p style="color:red; margin-bottom:10px;">{{ error }}</p>{% endif %}
    <form action="/login" method="post">
      <div class="input-group">
        <input type="email" name="email" id="email" class="floating-input" placeholder=" " required>
        <label for="email" class="floating-label">Admin Email</label>
      </div>
      <div class="input-group">
        <input type="password" name="password" id="password" class="floating-input" placeholder=" " required>
        <label for="password" class="floating-label">Password</label>
      </div>
      <button type="submit" class="login-btn">Enter Dashboard</button>
    </form>
  </div>
</body>
</html>
