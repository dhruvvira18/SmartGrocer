<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard | SmartGrocer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="padding: 40px;">
    <h1 style="color: var(--primary);">Inventory Control Center</h1>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: var(--card-shadow);">
            <h3>Low Stock Alerts</h3>
            <p style="color: red;">Items < 10 units: 4</p>
        </div>
        <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: var(--card-shadow);">
            <h3>Customer Database</h3>
            <p>Total Registered Users: 1,240</p>
            <button class="btn-primary">Send Discount Notification</button>
        </div>
    </div>
</body>
</html>
