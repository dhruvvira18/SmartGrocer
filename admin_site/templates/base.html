<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin Dashboard | SmartGrocer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--background, #0F1115);
            color: var(--text, #ffffff);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 250px;
            background-color: var(--section-bg, #1A1D24);
            color: var(--text-secondary, #a0aab2);
            display: flex;
            flex-direction: column;
            padding-top: 30px;
            border-radius: 0 20px 20px 0;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            margin: 0;
            height: 100vh;
            z-index: 10;
        }
        .sidebar h2 {
            text-align: left;
            margin-bottom: 40px;
            padding-left: 30px;
            color: var(--text, #ffffff);
        }
        .sidebar h2 span {
            color: var(--primary, #00FF66);
        }
        .sidebar a {
            color: var(--text-secondary, #a0aab2);
            text-decoration: none;
            padding: 12px 20px;
            margin: 5px 20px;
            display: block;
            font-weight: 500;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text, #ffffff);
        }
        .sidebar a.active {
            background-color: rgba(0, 255, 102, 0.1);
            color: var(--primary, #00FF66);
            font-weight: 600;
            box-shadow: inset 4px 0 0 var(--primary, #00FF66);
        }
        .sidebar a i {
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .btn-primary {
            background-color: var(--primary, #00FF66);
            color: #0F1115;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background-color: var(--secondary, #00E65C);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Smart<span>Grocer</span></h2>
        {% if retailer %}
            <a href="/admin/{{ retailer.slug }}/dashboard" class="{% if request.url.path.endswith('/dashboard') %}active{% endif %}"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="/admin/{{ retailer.slug }}/inventory" class="{% if request.url.path.endswith('/inventory') %}active{% endif %}"><i class="fas fa-boxes"></i> Inventory</a>
            <a href="/admin/{{ retailer.slug }}/orders" class="{% if request.url.path.endswith('/orders') %}active{% endif %}"><i class="fas fa-shopping-cart"></i> Orders</a>
            <a href="#" class="{% if request.url.path.endswith('/settings') %}active{% endif %}"><i class="fas fa-cog"></i> Settings</a>
        {% endif %}
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
