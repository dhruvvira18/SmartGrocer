<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin Dashboard | SmartGrocer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--background, #F0F7F2);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 250px;
            background-color: var(--primary, #2E7D32);
            color: white;
            display: flex;
            flex-direction: column;
            padding-top: 30px;
            border-radius: 0 15px 15px 0;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
            margin: 10px 0 10px 0;
            height: calc(100vh - 20px);
            z-index: 10;
        }
        .sidebar h2 {
            text-align: left;
            margin-bottom: 40px;
            padding-left: 30px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            margin: 5px 20px;
            display: block;
            font-weight: 400;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        .sidebar a.active {
            background-color: rgba(255, 255, 255, 0.2);
            font-weight: 600;
        }
        .sidebar a i {
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .btn-primary {
            background-color: var(--primary, #2E7D32);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>SmartGrocer</h2>
        {% if retailer %}
            <a href="/admin/{{ retailer.slug }}/dashboard" class="{% if request.url.path.endswith('/dashboard') %}active{% endif %}"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="/admin/{{ retailer.slug }}/inventory" class="{% if request.url.path.endswith('/inventory') %}active{% endif %}"><i class="fas fa-boxes"></i> Inventory</a>
            <a href="#" class="{% if request.url.path.endswith('/orders') %}active{% endif %}"><i class="fas fa-shopping-cart"></i> Orders</a>
            <a href="#" class="{% if request.url.path.endswith('/settings') %}active{% endif %}"><i class="fas fa-cog"></i> Settings</a>
        {% endif %}
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
