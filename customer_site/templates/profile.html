<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ retailer.business_name }} | My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <div class="nav-left">
                <a href="/shop/{{ retailer.slug }}/index" class="nav-icon-btn"><i class="fas fa-arrow-left"></i></a>
                <div class="logo" style="margin-left: 1rem;">
                    <span class="logo-text">{{ retailer.business_name }}</span>
                </div>
            </div>
            <div class="nav-right">
                <a href="/shop/{{ retailer.slug }}/logout" class="nav-icon-btn user-profile-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="user-greeting">Logout</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        <div class="profile-container" style="max-width: 600px; margin: 2rem auto; background: #fff; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="width: 80px; height: 80px; background: var(--section-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: var(--primary); font-size: 2.5rem;">
                    <i class="far fa-user"></i>
                </div>
                <h2>My Profile</h2>
            </div>

            {% if error %}
            <div style="background: #fee2e2; color: #ef4444; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; font-weight: 500;">
                {{ error }}
            </div>
            {% endif %}

            {% if success %}
            <div style="background: #dcfce7; color: #16a34a; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; font-weight: 500;">
                {{ success }}
            </div>
            {% endif %}

            <form action="/shop/{{ retailer.slug }}/profile" method="POST">
                <div class="input-group">
                    <input type="text" id="full_name" name="full_name" class="floating-input" value="{{ user.full_name }}" placeholder=" " required>
                    <label for="full_name" class="floating-label">Full Name</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" name="email" class="floating-input" value="{{ user.email }}" placeholder=" " required>
                    <label for="email" class="floating-label">Email Address</label>
                </div>

                <div class="input-group">
                    <input type="text" id="address" name="address" class="floating-input" value="{{ user.address if user.address else '' }}" placeholder=" ">
                    <label for="address" class="floating-label">Shipping Address</label>
                </div>

                <button type="submit" class="login-btn" style="margin-top: 1rem; font-size: 1.1rem; padding: 14px;">Save Changes</button>
            </form>
        </div>
    </main>
</body>
</html>
