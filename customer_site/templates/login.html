<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Apply theme early to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-theme');
            document.documentElement.classList.remove('dark-theme');
        } else {
            document.documentElement.classList.add('dark-theme');
            document.documentElement.classList.remove('light-theme');
        }
    </script>

  <meta charset="UTF-8" />
  <title>{{ retailer.business_name }} | SmartGrocer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">

  <div class="organic-bg"></div>

  <div class="login-card">
    <div class="logo-text">SmartGrocer</div>
    <h2 style="margin-bottom:5px; color: var(--text);">{{ retailer.business_name }}</h2>
    <p id="flow-label" style="color: var(--text-secondary); margin-bottom: 20px;">Enter your email to get started</p>

    <div id="js-error" class="error-msg" style="display: none; background-color: #fdeaea; color: #b71c1c; border: 1px solid #f5c6cb; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9em;"></div>

    <form action="/shop/{{ retailer.slug }}/login" method="post" id="unified-form" onsubmit="return handleFormSubmit(event)" novalidate>
        
        <div id="step1-container">
            <div class="input-group">
                <input type="email" id="email" name="email" class="floating-input" placeholder=" " autofocus>
                <label for="email" class="floating-label">Email</label>
            </div>
            <button type="button" class="login-btn" onclick="processStep1()">Continue</button>
        </div>

        <div id="step2-container" style="display: none;">
            
            <button type="button" onclick="resetToStep1()" style="width: 100%; background: rgba(0,255,102,0.1); border: 1px solid rgba(0,255,102,0.2); color: var(--primary); padding: 12px; border-radius: 50px; margin-bottom: 20px; cursor: pointer; font-size: 0.85em; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s;">
                <span id="display-email" style="font-weight: 600; padding-left: 10px;"></span>
                <span style="font-size: 0.9em; text-decoration: underline; padding-right: 10px;">Change</span>
            </button>

            <div id="signup-fields" style="display: none;">
                <div class="input-group">
                    <input type="text" id="full_name" name="full_name" class="floating-input" placeholder=" ">
                    <label for="full_name" class="floating-label">Full Name</label>
                </div>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" class="floating-input" placeholder=" ">
                <label for="password" class="floating-label">Password</label>
            </div>

            <div id="confirm-field-wrapper" style="display: none;">
                <div class="input-group">
                    <input type="password" id="confirm_password" name="confirm_password" class="floating-input" placeholder=" ">
                    <label for="confirm_password" class="floating-label">Confirm Password</label>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="login-btn">Login</button>
        </div>
    </form>
  </div>

<script>
let currentStep = 1;

// Single window.onload to handle server-side errors and state persistence
window.onload = function() {
    const backendError = "{{ error if error else '' }}";
    const showStep2 = "{{ 'true' if show_step2 else 'false' }}";
    const isSignup = "{{ 'true' if is_signup else 'false' }}";
    const emailVal = "{{ email_val if email_val else '' }}";

    if (backendError) {
        showError(backendError);
        
        if (showStep2 === 'true') {
            // Restore email context
            document.getElementById('email').value = emailVal;
            document.getElementById('display-email').innerText = emailVal;
            
            // Switch UI to Step 2
            document.getElementById('step1-container').style.display = 'none';
            document.getElementById('step2-container').style.display = 'block';
            
            const label = document.getElementById('flow-label');
            const submitBtn = document.getElementById('submit-btn');

            if (isSignup === 'true') {
                document.getElementById('signup-fields').style.display = 'block';
                document.getElementById('confirm-field-wrapper').style.display = 'block';
                label.innerText = "Create your account";
                submitBtn.innerText = "Create Account";
            } else {
                label.innerText = "Welcome back!";
                submitBtn.innerText = "Login";
            }
            
            currentStep = 2;
            document.getElementById('password').focus();
        }
    }
};

function showError(msg) {
    const errorDiv = document.getElementById('js-error');
    errorDiv.innerText = msg;
    errorDiv.style.display = 'block';
}

function hideError() {
    document.getElementById('js-error').style.display = 'none';
}

function resetToStep1() {
    // Return UI to Step 1
    document.getElementById('step2-container').style.display = 'none';
    document.getElementById('step1-container').style.display = 'block';
    
    // Unlock and clear the email field
    const emailField = document.getElementById('email');
    emailField.readOnly = false;
    emailField.value = "";
    emailField.focus();

    // Reset labels and internal state
    document.getElementById('flow-label').innerText = "Enter your email to get started";
    hideError();
    currentStep = 1;
}

async function processStep1() {
    const emailField = document.getElementById('email');
    const email = emailField.value;
    
    if (!email || !email.includes('@')) {
        showError("Please enter a valid email address.");
        return;
    }
    
    hideError();

    try {
        const response = await fetch(`/shop/{{ retailer.slug }}/check-user?email=${email}`);
        const data = await response.json();

        // UI Transitions
        document.getElementById('step1-container').style.display = 'none';
        document.getElementById('step2-container').style.display = 'block';
        document.getElementById('display-email').innerText = email;
        emailField.readOnly = true;
        
        const label = document.getElementById('flow-label');
        const submitBtn = document.getElementById('submit-btn');

        if (data.exists) {
            label.innerText = "Welcome back!";
            submitBtn.innerText = "Login";
            document.getElementById('signup-fields').style.display = 'none';
            document.getElementById('confirm-field-wrapper').style.display = 'none';
        } else {
            label.innerText = "Create your account";
            submitBtn.innerText = "Create Account";
            document.getElementById('signup-fields').style.display = 'block';
            document.getElementById('confirm-field-wrapper').style.display = 'block';
            document.getElementById('full_name').required = true;
            document.getElementById('confirm_password').required = true;
        }
        
        currentStep = 2;
        document.getElementById('password').required = true;
        document.getElementById('password').focus();
    } catch (e) { 
        showError("Connection error. Please try again."); 
    }
}

function handleFormSubmit(event) {
    if (currentStep === 1) {
        event.preventDefault();
        processStep1();
        return false;
    }
    return true;
}
</script>
</body>
</html>
