<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartGrocer | Freshness Delivered</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <div class="logo-icon">AV</div>
                <span>SmartGrocer</span>
            </div>
            <div class="nav-actions">
                <a href="/login" class="nav-btn"><i class="far fa-user"></i></a>
                <a href="#" class="nav-btn"><i class="fas fa-shopping-basket"></i></a>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <h1>Freshness delivered in <span style="color: var(--accent-gold);">15 mins</span></h1>
            <p>Shop organic groceries from your local stores.</p>
        </div>
    </header>

    <main class="container">
        <section class="section">
            <h2>Special Offers</h2>
            <div class="products-grid">
                <div class="product-card">
                    <img src="https://www.pngmart.com/files/1/Blueberry-PNG-Clipart.png" alt="Blueberry" style="width: 100px; margin: 0 auto;">
                    <h3>Blueberries</h3>
                    <p>$4.99</p>
                    <button class="add-cart-btn"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
